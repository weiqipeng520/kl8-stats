<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐8 开奖统计 | 近100期记录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 2rem; padding-bottom: 3rem; }
    .latest-box { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid #dc3545; }
    .number-badge { display: inline-block; width: 36px; height: 36px; line-height: 36px; 
      text-align: center; border-radius: 50%; background: #e9ecef; margin: 2px; font-weight: bold; font-size: 14px; }
    .hot { background: #dc3545; color: white; }
    .cold { background: #0d6efd; color: white; }
    .table-responsive { max-height: 70vh; overflow-y: auto; }
    thead th { position: sticky; top: 0; background: white; z-index: 10; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="text-center mb-4">快乐8 开奖统计系统</h1>

  <!-- 最新开奖模块 -->
  <div class="latest-box" id="latest">
    <h4>本期最新开奖</h4>
    <p id="latest-info">数据加载中...</p>
    <div id="latest-nums" class="mt-2"></div>
  </div>

  <!-- 标签切换栏 -->
  <ul class="nav nav-tabs mb-3" id="myTab">
    <li class="nav-item">
      <a class="nav-link active" data-bs-toggle="tab" href="#history">近100期开奖记录</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#stats">号码开出次数排名</a>
    </li>
  </ul>

  <div class="tab-content">
    <!-- 近100期记录表格 -->
    <div class="tab-pane fade show active" id="history">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>期号</th>
              <th>开奖日期</th>
              <th>开奖号码</th>
              <th>和值</th>
              <th>奇偶比</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 号码统计模块 -->
    <div class="tab-pane fade" id="stats">
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-danger text-white">
              <h5 class="mb-0">热号TOP20（近100期开出次数最多）</h5>
            </div>
            <div class="card-body">
              <div id="hot-list"></div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">冷号TOP20（近100期开出次数最少）</h5>
            </div>
            <div class="card-body">
              <div id="cold-list"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">1-80号完整次数排名（按出现次数降序）</h5>
        </div>
        <div class="card-body">
          <div id="all-stats" class="d-flex flex-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-5 text-muted text-center">
    <p class="fw-bold">数据仅供参考，不构成任何投注建议，彩票开奖信息以中国福利彩票官方发布为准</p>
    <p>数据更新时间：<span id="update-time">-</span></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 核心数据加载与渲染逻辑
async function loadAllData() {
  try {
    // 加载近100期开奖数据
    const response = await fetch('data.json');
    if (!response.ok) throw new Error('数据加载失败');
    const lotteryData = await response.json();

    // 渲染各模块
    renderLatestLottery(lotteryData[0]); // 最新一期
    renderHistoryTable(lotteryData);      // 历史表格
    renderNumberStats(lotteryData);       // 号码统计
    document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');

  } catch (error) {
    document.getElementById('latest-info').textContent = '数据加载失败，请检查data.json文件是否正确上传';
    console.error('数据加载错误：', error);
  }
}

// 渲染最新开奖模块
function renderLatestLottery(latest) {
  const infoText = `第${latest.period}期 | 开奖日期：${latest.date}`;
  document.getElementById('latest-info').textContent = infoText;
  
  const numsContainer = document.getElementById('latest-nums');
  numsContainer.innerHTML = latest.numbers.map(num => 
    `<span class="number-badge hot">${num}</span>`
  ).join('');
}

// 渲染历史记录表格
function renderHistoryTable(data) {
  const tbody = document.getElementById('history-body');
  tbody.innerHTML = '';

  data.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.period}</td>
      <td>${item.date}</td>
      <td>${item.numbers.join(' ')}</td>
      <td>${item.sum}</td>
      <td>${item.odd}:${item.even}</td>
    `;
    tbody.appendChild(tr);
  });
}

// 渲染号码统计排名
function renderNumberStats(data) {
  // 初始化1-80号的计数
  const numberCount = {};
  for (let i = 1; i <= 80; i++) {
    numberCount[i] = 0;
  }

  // 统计每个号码出现次数
  data.forEach(period => {
    period.numbers.forEach(num => {
      const numInt = parseInt(num);
      numberCount[numInt]++;
    });
  });

  // 转换为数组并按次数降序排序
  const sortedNumbers = Object.entries(numberCount)
    .map(([num, count]) => ({
      number: parseInt(num),
      count: count
    }))
    .sort((a, b) => b.count - a.count);

  // 渲染热号TOP20
  const hotList = sortedNumbers.slice(0, 20);
  document.getElementById('hot-list').innerHTML = hotList.map(item => 
    `<span class="number-badge hot">${String(item.number).padStart(2, '0')} (${item.count})</span>`
  ).join(' ');

  // 渲染冷号TOP20
  const coldList = sortedNumbers.slice(-20).reverse();
  document.getElementById('cold-list').innerHTML = coldList.map(item => 
    `<span class="number-badge cold">${String(item.number).padStart(2, '0')} (${item.count})</span>`
  ).join(' ');

  // 渲染全部号码
  document.getElementById('all-stats').innerHTML = sortedNumbers.map(item => 
    `<span class="number-badge" title="近100期开出${item.count}次">${String(item.number).padStart(2, '0')} (${item.count})</span>`
  ).join(' ');
}

// 页面加载完成后执行
window.addEventListener('DOMContentLoaded', loadAllData);
</script>
</body>
</html>
